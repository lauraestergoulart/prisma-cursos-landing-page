<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/style.css" />

    <title>Inscrição Realizada</title>
  </head>

  <body>
    <body>
      <main class="success-page">
        <nav class="success-navbar">
          <img
            src="../assets/logoPrisma2.svg"
            alt="Logo Prisma"
            class="navbar-logo"
          />

          <ul class="navbar-links">
            <li><a href="#">Início</a></li>
            <li><a href="#">Cursos</a></li>
            <li><a href="#">Quem Somos?</a></li>
            <li><a href="#">Depoimentos</a></li>
            <li><a href="#">Contato</a></li>
          </ul>

          <button class="perfil-btn">
            <img
              src="../assets/mascote-prisma.png"
              alt="Perfil"
              class="perfil-icon"
            />

            <span>PERFIL</span>
          </button>
        </nav>
        <h1 class="success-title">
          Inscrição realizada com
          <span>sucesso!</span>
        </h1>

        <img
          src="../assets/mascote-prisma.png"
          alt="Mascote Prisma"
          class="success-mascot"
        />

        <h2 class="success-subtitle">Nível 1 desbloqueado 🏆</h2>

        <p class="success-text">
          Prepare-se para o Level Up. Sua jornada épica na Prisma Cursos acaba
          de começar. Verifique seu e-mail para as instruções da Missão 1!
        </p>

        <div class="success-buttons">
          <button class="btn-primary">VOLTAR PARA A PÁGINA INICIAL</button>

          <button class="btn-primary">SUAS PRÓXIMAS MISSÕES</button>
        </div>
      </main>
    </body>
  </body>
</html>
