<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/style.css" />

    <title>Navbar Prisma</title>
  </head>

  <body>
    
    
    <nav class="navbar">

      <img src="../assets/logoPrisma2.svg" alt="Logo Prisma" class="logo" />

      <ul class="nav-links">
        <li><a href="index.html"><u>Início</u></a></li>
        <li><a href="cursos.html"><u>Cursos</u></a></li>
        <li><a href="quemsomos.html"><u>Quem Somos?</u></a></li>
        <li><a href="depoimentos.html"><u>Depoimentos</u></a></li>
        <li><a href="contato.html"><u>Contato</u></a></li>
      </ul>

      <a href="#" class="btn-matricula"> Faça sua matrícula </a>

    </nav>

    <nav class="nav-mobile">
      <div class="menu-hamburguer">
        <div class="linha1"></div>
        <div class="linha2"></div>
        <div class="linha3"></div>
      </div> 

      <div class="menu-lista">
        <ul>
          <li><a href="index.html"> • Início</a></li>
          <li><a href="cursos.html"> • Cursos</a></li>
          <li><a href="quemsomos.html"> • Quem Somos?</a></li>
          <li><a href="depoimentos.html"> • Depoimentos</a></li>
          <li><a href="contato.html"> • Contato</a></li>
        </ul>
        <img src="../assets/logoPrisma2.svg" alt="Logo Prisma" class="logo-menu-ativo"/>
        <div class="botao-fechar">X
        </div>
        <div class="btn-matricula-mob">
          <a href="#"> Faça sua matrícula </a>
        </div>
      </div>
    </nav>

    <script>
      const hamburguer = document.querySelector(".menu-hamburguer");
      const menu = document.querySelector(".menu-lista");
      const fechar = document.querySelector(".botao-fechar");

      hamburguer.addEventListener("click", () => {
      menu.classList.toggle("ativo");

      fechar.addEventListener("click", () => {
      menu.classList.remove("ativo");
    });
    });
    </script>
<main class="login-wrapper">
    
    <div class="card-login">
      <h2 class="titulo-login">Faça seu login</h2>
      
      <form class="form-login">
        <div class="input-group">
          <input type="email" placeholder="e-mail*" required>
        </div>
        
        <div class="input-group">
          <input type="password" placeholder="senha*" required>
        </div>
        
        <button type="submit" class="btn-entrar">ENTRAR</button>
      </form>
    </div>

    <img src="../assets/mascotePrisma 3.svg" alt="Mascote Prisma" class="mascote-login">

  </main>
  </body>
</html>
